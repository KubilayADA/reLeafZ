<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 64" width="720" height="64">
  <!-- Apple Pay -->
  <g>
    <rect x="0" y="0" width="90" height="54" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
    <!-- Apple logo -->
    <path d="M34 17.2c1.1-1.4 1.9-3.3 1.7-5.2-1.6.1-3.6 1.1-4.8 2.5-1.1 1.2-2 3.2-1.7 5 1.8.1 3.7-.9 4.8-2.3z" fill="#000"/>
    <path d="M35.7 19.8c-2.6-.2-4.9 1.5-6.1 1.5-1.3 0-3.2-1.4-5.3-1.4-2.7.1-5.2 1.6-6.6 4.1-2.8 4.9-.7 12.1 2 16.1 1.3 1.9 2.9 4.1 5 4-2 .1 2.8-1.3 5.2-1.3 2.4 0 3.1 1.3 5.2 1.3 2.2-.1 3.5-2 4.9-3.9 1.5-2.2 2.2-4.4 2.2-4.5-.1-.1-4.2-1.6-4.2-6.5 0-4.1 3.3-6 3.4-6.1-1.9-2.7-4.8-3.3-5.7-3.3z" fill="#000"/>
    <text x="53" y="34" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="16" font-weight="600" fill="#000">Pay</text>
  </g>

  <!-- Google Pay -->
  <g transform="translate(100,0)">
    <rect x="0" y="0" width="96" height="54" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
    <text x="14" y="36" font-family="Arial" font-size="22" font-weight="700" fill="#4285F4">G</text>
    <text x="36" y="35" font-family="Arial" font-size="15" font-weight="500" fill="#5f6368">Pay</text>
  </g>

  <!-- Visa -->
  <g transform="translate(206,0)">
    <rect x="0" y="0" width="86" height="54" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
    <text x="43" y="36" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#1a1f71" text-anchor="middle">VISA</text>
  </g>

  <!-- Mastercard -->
  <g transform="translate(302,0)">
    <rect x="0" y="0" width="80" height="54" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
    <circle cx="30" cy="27" r="14" fill="#EB001B"/>
    <circle cx="50" cy="27" r="14" fill="#F79E1B"/>
    <path d="M40 16.2a14 14 0 0 1 0 21.6 14 14 0 0 1 0-21.6z" fill="#FF5F00"/>
  </g>

  <!-- Amex -->
  <g transform="translate(392,0)">
    <rect x="0" y="0" width="96" height="54" rx="8" fill="#016FD0" stroke="#e0e0e0" stroke-width="1.5"/>
    <text x="48" y="23" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="white" text-anchor="middle" letter-spacing="0.5">AMERICAN</text>
    <text x="48" y="37" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="white" text-anchor="middle" letter-spacing="0.5">EXPRESS</text>
  </g>

  <!-- SEPA -->
  <g transform="translate(498,0)">
    <rect x="0" y="0" width="80" height="54" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
    <text x="12" y="36" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#003299">S</text>
    <text x="28" y="36" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#FFCC02">€</text>
    <text x="44" y="36" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#003299">PA</text>
  </g>

  <!-- Klarna -->
  <g transform="translate(588,0)">
    <rect x="0" y="0" width="90" height="54" rx="8" fill="#FFB3C7" stroke="#e0e0e0" stroke-width="1.5"/>
    <text x="45" y="35" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#17120E" text-anchor="middle">klarna</text>
  </g>
</svg>
